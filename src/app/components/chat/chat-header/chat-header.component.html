<app-top-panel [backButton]="backButton">
    @if (chat()) {
        <app-avatar [urlOptions]="urlOptions()"></app-avatar>
    }
    <app-user-details [value]="chat()?.chatName"></app-user-details>
    @if (!isAnyCallInProgress()) {
        <app-call-button (buttonClick)="onCallClicked()"></app-call-button>
    }
</app-top-panel>
