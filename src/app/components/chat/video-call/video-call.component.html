<video #remoteVideo class="remote-video" autoplay playsinline></video>
<video #localVideo class="local-video" autoplay muted playsinline></video>
<div class="minimize-button">
    <app-minimize-button (buttonClick)="minimizeCall()"></app-minimize-button>
</div>
<div class="controls">
    <div class="controls-inner">
        <app-media-toggle-button [isMuted]="!captureVideo()" [mode]="'video'"
            (buttonClick)="toggleCaptureVideo()"></app-media-toggle-button>
        <app-media-toggle-button [isMuted]="!captureAudio()" [mode]="'audio'"
            (buttonClick)="toggleCaptureAudio()"></app-media-toggle-button>
        <app-camera-rotate-button (buttonClick)="switchCamera()"></app-camera-rotate-button>
        <app-call-button [mode]="'end-call'" (buttonClick)="endCall()"></app-call-button>
    </div>
</div>
