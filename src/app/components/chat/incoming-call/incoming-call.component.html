<div class="caller-info">
    <app-avatar [urlOptions]="urlOptions()" class="caller-info__avatar"></app-avatar>
    <div class="caller-info__name">{{callerName()}}</div>
</div>
<div class="controls">
    <app-call-button [mode]="'accept-call'" (buttonClick)="onAcceptClicked()" class="accept-call"></app-call-button>
    <app-call-button [mode]="'end-call'" (buttonClick)="onDeclineClicked()"></app-call-button>
</div>
