<div class="caller-info">
    <app-avatar [urlOptions]="caller()?.urlOptions" class="caller-info__avatar"></app-avatar>
    <div class="caller-info__name">{{caller()?.name}}</div>
</div>
<div class="controls">
    <app-call-button [mode]="'start-call'" (buttonClick)="onAcceptClicked()" class="start-call"></app-call-button>
    <app-call-button [mode]="'end-call'" (buttonClick)="onDeclineClicked()"></app-call-button>
</div>
